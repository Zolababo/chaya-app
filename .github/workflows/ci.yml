# 루트에서 pnpm build / lint — PR·main 푸시 시 자동 실행
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # package.json 의 packageManager(pnpm@9.15.0)와 중복 지정 시 "Multiple versions of pnpm" 오류
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint and build
        run: pnpm run verify

      # HARDENING_ORDER 2단계: 알려진 취약점 표시 (차단 없음 — 추후 severity 조정 가능)
      - name: Dependency audit (informational)
        continue-on-error: true
        run: pnpm audit --audit-level=moderate
