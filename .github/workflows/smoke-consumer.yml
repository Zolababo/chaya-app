# 프로덕션 소비자 앱 가용성 스모크 (외부 HTTPS, 비밀 불필요)
name: Smoke consumer

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
  schedule:
    # 매일 UTC 06:00 (한국 15:00)
    - cron: "0 6 * * *"

concurrency:
  group: smoke-consumer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prod-smoke:
    # PR용 CI 성공 후에는 스테이징이 아닌 프로덕션만 치므로 main 브랜치 CI 완료·수동 실행·일정만 허용
    if: >
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_run' &&
           github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # workflow_run(main CI 성공): 프로덕션이 새 커밋을 반영할 때까지 SHA 검증을 재시도
      - name: 프로덕션 스모크 (/health · robots · 메뉴 · 주문 허브)
        env:
          MAIN_CI_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          ARGS="--tenant demo"
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ -n "$MAIN_CI_SHA" ]; then
            ARGS="$ARGS --expected-sha $MAIN_CI_SHA"
          fi
          node ./scripts/smoke-consumer-menu.mjs $ARGS
